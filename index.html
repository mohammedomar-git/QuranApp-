    .dark-mode { background-color: #0f172a !important; color: #f1f5f9; }
    .dark-mode .bg-white { background-color: #1e293b !important; color: #f1f5f9; border-color: #334155 !important; }
    .dark-mode .text-slate-800, .dark-mode .text-slate-600 { color: #cbd5e1 !important; }
    .dark-mode audio { filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .ayah-card.playing { border-left: 4px solid var(--primary); background-color: rgba(5, 150, 105, 0.08); }
    .sticky-header { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

<div id="app">
  <header class="bg-emerald-800 text-white p-4 shadow-xl sticky-header">
    <div class="container mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3 cursor-pointer" onclick="goHome()">
        <span class="text-2xl">📖</span>
        <h1 class="text-xl font-bold">আল-কুরআন</h1>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleDarkMode()" class="p-2 hover:bg-emerald-900 rounded-full transition">🌙/☀️</button>
        <button id="back-btn" class="hidden bg-emerald-600 hover:bg-emerald-500 px-5 py-1.5 rounded-full text-sm font-bold transition-all" onclick="goHome()">ফিরে যান</button>
      </div>
    </div>
  </header>

  <main class="container mx-auto p-4 max-w-5xl">
    
    <div id="home-view">
      <div class="bg-emerald-700 text-white p-8 rounded-3xl mb-8 shadow-lg mt-4 bg-[url('https://www.transparenttextures.com/patterns/islamic-exercise.png')]">
        <h2 class="text-2xl font-bold mb-2">স্মার্ট কুরআন সার্চ</h2>
        <p class="opacity-90 mb-6 text-sm">যেকোনো বাংলা শব্দ (যেমন: 'মৌমাছি') লিখে সরাসরি আয়াত খুঁজে বের করুন</p>
        <div class="relative max-w-2xl">
            <input type="text" id="searchInput" placeholder="খুঁজুন..." 
            class="w-full p-4 pl-6 rounded-2xl text-slate-800 outline-none shadow-2xl focus:ring-4 focus:ring-emerald-400 transition-all">
            <button onclick="searchQuran()" class="absolute right-3 top-2 bg-emerald-600 p-2 px-6 rounded-xl font-bold hover:bg-emerald-500 transition">খুঁজুন</button>
        </div>
      </div>

      <div id="search-loading" class="hidden flex justify-center py-10"><div class="loader"></div></div>
      <div id="surah-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </div>

    <div id="reading-view" class="hidden">
      <div class="flex flex-wrap justify-between items-center mb-6 bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 gap-4 sticky top-[72px] z-40">
        <h2 id="surah-info-title" class="font-bold text-emerald-700 dark:text-emerald-400"></h2>
        
        <div class="flex items-center gap-3">
            <div class="flex items-center bg-slate-100 dark:bg-slate-700 rounded-xl px-2">
                <input type="number" id="jumpInput" placeholder="আয়াত নং" class="w-16 bg-transparent p-2 text-sm outline-none font-bold">
                <button onclick="handleJump()" class="bg-emerald-600 text-white text-[10px] px-2 py-1 rounded-lg font-bold">জাম্প</button>
            </div>

            <div class="flex bg-slate-100 dark:bg-slate-700 rounded-xl p-1">
                <button onclick="changeFontSize(-2)" class="px-3 py-1 font-bold">-</button>
                <button onclick="changeFontSize(2)" class="px-3 py-1 font-bold">+</button>
            </div>
        </div>
      </div>

      <div id="surah-content" class="space-y-6 pb-24"></div>
    </div>
  </main>
</div>

    {id:104, n:"হুমাযাহ", m:"পরনিন্দাকারী", v:9, t:"মক্কী"}, 
    {id:105, n:"ফীল", m:"হাতি", v:5, t:"মক্কী"},
    {id:106, n:"কুরাইশ", m:"কুরাইশ গোত্র", v:4, t:"মক্কী"}, 
    {id:107, n:"মাউন", m:"সাহায্য-সহায়তা", v:7, t:"মক্কী"}, 
    {id:108, n:"কাওসার", m:"প্রাচুর্য", v:3, t:"মক্কী"},
    {id:109, n:"কাফিরুন", m:"অস্বীকারকারীগণ", v:6, t:"মক্কী"}, 
    {id:110, n:"নাসর", m:"বিজয়,সাহায্য", v:3, t:"মদীনা"}, 
    {id:111, n:"লাহাব", m:"জ্বলন্ত অঙ্গার", v:5, t:"মক্কী"},
    {id:112, n:"আল-ইখলাস", m:"একনিষ্ঠতা", v:4, t:"মক্কী"}, 
    {id:113, n:"আল-ফালাক", m:"নিশিভোর", v:5, t:"মক্কী"}, 
    {id:114, n:"আন-নাস", m:"মানবজাতি", v:6, t:"মক্কী"}
];


let currentFontSize = 28;
let currentSurahVerses = 0;
let currentPlayingAudio = null; // বর্তমান অডিও ট্র্যাক ট্র্যাক করার জন্য

function bnNum(n) { return n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]); }

function initHome(list = surahList, searchMatches = null) {
    const grid = document.getElementById('surah-grid');
    grid.innerHTML = list.map(s => {
        const match = searchMatches ? searchMatches.find(m => m.surah.number === s.id) : null;
        return `
            <div onclick="loadSurah(${s.id}, '${s.n}', ${match ? match.numberInSurah : null})" class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 hover:border-emerald-500 hover:shadow-xl cursor-pointer transition-all">
                <div class="flex justify-between mb-3">
                    <span class="bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 font-bold w-8 h-8 flex items-center justify-center rounded-lg text-xs">${bnNum(s.id)}</span>
                    ${match ? `<span class="bg-orange-100 text-orange-600 text-[10px] px-2 py-1 rounded-full font-bold">আয়াত নং ${bnNum(match.numberInSurah)} তে মিল আছে</span>` : `<span class="text-[10px] text-slate-400 uppercase font-bold">${s.t}</span>`}
                </div>
                <h3 class="text-lg font-bold text-slate-800 dark:text-white">${s.n}</h3>
                <p class="text-xs text-slate-500 mt-1">আয়াত: ${bnNum(s.v)}</p>
            </div>
        `;
    }).join('');
}

async function searchQuran() {
    const query = document.getElementById('searchInput').value.trim();
    if(!query) { initHome(surahList); return; }
    document.getElementById('search-loading').classList.remove('hidden');
    document.getElementById('surah-grid').innerHTML = '';
    try {
        const res = await fetch(`https://api.alquran.cloud/v1/search/${query}/all/bn.bengali`);
        const data = await res.json();
        if(data.code === 200 && data.data.count > 0) {
            const matches = data.data.matches;
            const uniqueSurahIds = [...new Set(matches.map(m => m.surah.number))];
            const filteredSurahs = surahList.filter(s => uniqueSurahIds.includes(s.id));
            initHome(filteredSurahs, matches);
        } else {
            document.getElementById('surah-grid').innerHTML = `<p class="col-span-full text-center py-10 text-slate-500 font-bold">দুঃখিত, '${query}' শব্দটি পাওয়া যায়নি।</p>`;
        }
    } catch (e) {
        alert("সার্চ করার সময় সমস্যা হয়েছে।");
    } finally {
        document.getElementById('search-loading').classList.add('hidden');
    }
}

async function loadSurah(id, name, targetAyah = null) {
    document.getElementById('home-view').classList.add('hidden');
    document.getElementById('reading-view').classList.remove('hidden');
    document.getElementById('back-btn').classList.remove('hidden');
    document.getElementById('surah-content').innerHTML = '<div class="flex justify-center py-20"><div class="loader"></div></div>';
    
    const surah = surahList.find(s => s.id === id);
    currentSurahVerses = surah.v;
    document.getElementById('surah-info-title').innerText = "সূরা " + name;

    try {
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/editions/quran-uthmani,bn.bengali,ar.alafasy`);
        const d = await res.json();
        renderAyahs(d.data, id);
        if(targetAyah) {
            setTimeout(() => jumpToAyah(targetAyah - 1), 500);
        } else {
            window.scrollTo(0,0);
        }
    } catch (e) {
        goHome();
    }
}

function renderAyahs(data, surahId) {
    const ar = data[0].ayahs;
    const bn = data[1].ayahs;
    const au = data[2].ayahs;
    let html = '';
    if (surahId !== 1 && surahId !== 9) {
        html += `<div class="bg-white dark:bg-slate-800 p-8 rounded-3xl text-center text-3xl text-emerald-600 arabic mb-6 shadow-sm border border-emerald-100 dark:border-emerald-900/30">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>`;
    }
    ar.forEach((ayah, i) => {
        let text = ayah.text;
        if (i === 0 && surahId !== 1 && surahId !== 9) {
            const words = text.split(' ');
            if (words.length > 4) text = words.slice(4).join(' ');
        }
        html += `
            <div id="ayah-${i}" class="ayah-card bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 transition-all">
                <div class="flex justify-between items-center mb-6">
                    <span class="w-8 h-8 flex items-center justify-center bg-emerald-600 text-white rounded-full text-[10px] font-bold shadow-lg">${bnNum(i + 1)}</span>
                    <audio id="audio-${i}" onplay="onPlay(${i})" onended="playNext(${i})" controls preload="none" class="h-8">
                        <source src="${au[i].audio}" type="audio/mpeg">
                    </audio>
                </div>
                <p class="arabic mb-6 text-slate-800 dark:text-slate-100" style="font-size: ${currentFontSize}px">${text}</p>
                <p class="text-slate-600 dark:text-slate-300 text-lg border-l-4 border-emerald-500 pl-5 font-medium">${bn[i].text}</p>
            </div>
        `;
    });
    document.getElementById('surah-content').innerHTML = html;
}

function handleJump() {
    const val = parseInt(document.getElementById('jumpInput').value);
    if(val > 0 && val <= currentSurahVerses) {
        jumpToAyah(val - 1);
    } else {
        alert("এই সূরায় আয়াত আছে ১ থেকে " + bnNum(currentSurahVerses) + " পর্যন্ত।");
    }
}

function jumpToAyah(index) {
    const el = document.getElementById(`ayah-${index}`);
    if(el) {
        const offset = 160;
        const pos = el.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({ top: pos, behavior: 'smooth' });
        el.classList.add('playing');
        setTimeout(() => el.classList.remove('playing'), 2000);
    }
}

function onPlay(i) {
    const audio = document.getElementById(`audio-${i}`);
    
    // ১. যদি অন্য কোনো অডিও বাজে তবে তা বন্ধ করে নতুনটা শুরু হবে
    if (currentPlayingAudio && currentPlayingAudio !== audio) {
        currentPlayingAudio.pause();
        currentPlayingAudio.currentTime = 0;
    }
    currentPlayingAudio = audio;

    document.querySelectorAll('.ayah-card').forEach(c => c.classList.remove('playing'));
    document.getElementById(`ayah-${i}`).classList.add('playing');
}

function playNext(i) {
    const next = document.getElementById(`audio-${i+1}`);
    if(next) {
        next.play();
        jumpToAyah(i+1);
    }
}

function changeFontSize(d) {
    currentFontSize = Math.max(20, Math.min(50, currentFontSize + d));
    document.querySelectorAll('.arabic').forEach(p => p.style.fontSize = currentFontSize + 'px');
}

function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
}

function goHome() {
    // ২. হোমে ফিরে গেলে অডিও বন্ধ করা
    if (currentPlayingAudio) {
        currentPlayingAudio.pause();
        currentPlayingAudio.currentTime = 0;
        currentPlayingAudio = null;
    }
    
    document.getElementById('home-view').classList.remove('hidden');
    document.getElementById('reading-view').classList.add('hidden');
    document.getElementById('back-btn').classList.add('hidden');
    window.scrollTo(0,0);
}

initHome();
</script>
</body>
</html>
