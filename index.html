let currentFontSize = 28;
let currentSurahVerses = 0;

function bnNum(n) { return n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]); }

function initHome(list = surahList, searchMatches = null) {
    const grid = document.getElementById('surah-grid');
    grid.innerHTML = list.map(s => {
        const match = searchMatches ? searchMatches.find(m => m.surah.number === s.id) : null;
        return `
            <div onclick="loadSurah(${s.id}, '${s.n}', ${match ? match.numberInSurah : null})" class="bg-white dark:bg-slate-800 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 hover:border-emerald-500 hover:shadow-xl cursor-pointer transition-all">
                <div class="flex justify-between mb-3">
                    <span class="bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 font-bold w-8 h-8 flex items-center justify-center rounded-lg text-xs">${bnNum(s.id)}</span>
                    ${match ? `<span class="bg-orange-100 text-orange-600 text-[10px] px-2 py-1 rounded-full font-bold">আয়াত নং ${bnNum(match.numberInSurah)} তে মিল আছে</span>` : `<span class="text-[10px] text-slate-400 uppercase font-bold">${s.t}</span>`}
                </div>
                <h3 class="text-lg font-bold text-slate-800 dark:text-white">${s.n}</h3>
                <p class="text-xs text-slate-500 mt-1">আয়াত: ${bnNum(s.v)}</p>
            </div>
        `;
    }).join('');
}

// অ্যাডভান্সড বাংলা অনুবাদ সার্চ
async function searchQuran() {
    const query = document.getElementById('searchInput').value.trim();
    if(!query) { initHome(surahList); return; }

    document.getElementById('search-loading').classList.remove('hidden');
    document.getElementById('surah-grid').innerHTML = '';

    try {
        // আল-কুরআন ক্লাউড API এর মাধ্যমে অনুবাদে শব্দ খোঁজা
        const res = await fetch(`https://api.alquran.cloud/v1/search/${query}/all/bn.bengali`);
        const data = await res.json();
        
        if(data.code === 200 && data.data.count > 0) {
            const matches = data.data.matches;
            // রেজাল্ট থেকে ইউনিক সূরা আইডি বের করা
            const uniqueSurahIds = [...new Set(matches.map(m => m.surah.number))];
            const filteredSurahs = surahList.filter(s => uniqueSurahIds.includes(s.id));
            
            initHome(filteredSurahs, matches);
        } else {
            document.getElementById('surah-grid').innerHTML = `<p class="col-span-full text-center py-10 text-slate-500 font-bold">দুঃখিত, '${query}' শব্দটি পাওয়া যায়নি।</p>`;
        }
    } catch (e) {
        alert("সার্চ করার সময় সমস্যা হয়েছে।");
    } finally {
        document.getElementById('search-loading').classList.add('hidden');
    }
}

async function loadSurah(id, name, targetAyah = null) {
    document.getElementById('home-view').classList.add('hidden');
    document.getElementById('reading-view').classList.remove('hidden');
    document.getElementById('back-btn').classList.remove('hidden');
    document.getElementById('surah-content').innerHTML = '<div class="flex justify-center py-20"><div class="loader"></div></div>';
    
    const surah = surahList.find(s => s.id === id);
    currentSurahVerses = surah.v;
    document.getElementById('surah-info-title').innerText = "সূরা " + name;

    try {
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/editions/quran-uthmani,bn.bengali,ar.alafasy`);
        const d = await res.json();
        
        renderAyahs(d.data, id);
        
        // যদি সার্চ থেকে আসা হয়, সরাসরি ওই আয়াতে স্ক্রল করো
        if(targetAyah) {
            setTimeout(() => jumpToAyah(targetAyah - 1), 500);
        } else {
            window.scrollTo(0,0);
        }
    } catch (e) {
        goHome();
    }
}

function renderAyahs(data, surahId) {
    const ar = data[0].ayahs;
    const bn = data[1].ayahs;
    const au = data[2].ayahs;
    let html = '';

    if (surahId !== 1 && surahId !== 9) {
        html += `<div class="bg-white dark:bg-slate-800 p-8 rounded-3xl text-center text-3xl text-emerald-600 arabic mb-6 shadow-sm border border-emerald-100 dark:border-emerald-900/30">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>`;
    }

    ar.forEach((ayah, i) => {
        let text = ayah.text;
        // বিসমিল্লাহ রিমুভার
        if (i === 0 && surahId !== 1 && surahId !== 9) {
            const words = text.split(' ');
            if (words.length > 4) text = words.slice(4).join(' ');
        }

        html += `
            <div id="ayah-${i}" class="ayah-card bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 transition-all">
                <div class="flex justify-between items-center mb-6">
                    <span class="w-8 h-8 flex items-center justify-center bg-emerald-600 text-white rounded-full text-[10px] font-bold shadow-lg">${bnNum(i + 1)}</span>
                    <audio id="audio-${i}" onplay="onPlay(${i})" onended="playNext(${i})" controls preload="none" class="h-8">
                        <source src="${au[i].audio}" type="audio/mpeg">
                    </audio>
                </div>
                <p class="arabic mb-6 text-slate-800 dark:text-slate-100" style="font-size: ${currentFontSize}px">${text}</p>
                <p class="text-slate-600 dark:text-slate-300 text-lg border-l-4 border-emerald-500 pl-5 font-medium">${bn[i].text}</p>
            </div>
        `;
    });
    document.getElementById('surah-content').innerHTML = html;
}

function handleJump() {
    const val = parseInt(document.getElementById('jumpInput').value);
    if(val > 0 && val <= currentSurahVerses) {
        jumpToAyah(val - 1);
    } else {
        alert("এই সূরায় আয়াত আছে ১ থেকে " + bnNum(currentSurahVerses) + " পর্যন্ত।");
    }
}

function jumpToAyah(index) {
    const el = document.getElementById(`ayah-${index}`);
    if(el) {
        const offset = 160;
        const pos = el.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({ top: pos, behavior: 'smooth' });
        
        // হাইলাইট ইফেক্ট
        el.classList.add('playing');
        setTimeout(() => el.classList.remove('playing'), 2000);
    }
}

function onPlay(i) {
    document.querySelectorAll('.ayah-card').forEach(c => c.classList.remove('playing'));
    document.getElementById(`ayah-${i}`).classList.add('playing');
}

function playNext(i) {
    const next = document.getElementById(`audio-${i+1}`);
    if(next) {
        next.play();
        jumpToAyah(i+1);
    }
}

function changeFontSize(d) {
    currentFontSize = Math.max(20, Math.min(50, currentFontSize + d));
    document.querySelectorAll('.arabic').forEach(p => p.style.fontSize = currentFontSize + 'px');
}

function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
}

function goHome() {
    document.getElementById('home-view').classList.remove('hidden');
    document.getElementById('reading-view').classList.add('hidden');
    document.getElementById('back-btn').classList.add('hidden');
    window.scrollTo(0,0);
}

initHome();
</script>
</body>
</html>
